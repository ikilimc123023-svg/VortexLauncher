<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortexLauncher İndir</title>
    <style>
        /* Sayfa merkezleme ve arka plan */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #050505;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* RGB Parlama Animasyonu */
        @keyframes rgb-glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ana Buton Tasarımı */
        .download-btn {
            position: relative;
            padding: 40px 80px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 4px;
            border-radius: 15px;
            transition: 0.5s;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            z-index: 1;
            animation: rgb-glow 20s linear infinite;
            border: none;
            cursor: pointer;
        }

        /* Butonun arkasındaki parlama efekti (Glow) */
        .download-btn::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            z-index: -1;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            border-radius: 20px;
            filter: blur(25px);
            opacity: 0.7;
            transition: 0.5s;
            animation: rgb-glow 20s linear infinite;
        }

        /* Hover (Üzerine gelince) efekti */
        .download-btn:hover {
            transform: scale(1.1);
        }

        .download-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <a href="VortexLauncher.exe" class="download-btn">İNDİR</a>

</body>
</html>
